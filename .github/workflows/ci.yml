name: CI

# Per §11.7 of the design document, GitHub Actions is the CI provider.
# Per §8.6, the test battery runs on every commit. This workflow
# runs the data layer + Godot runtime tests on every push and PR.
#
# Triggers:
#   - push to main: full test run
#   - pull_request to main: full test run
#   - manual dispatch: full test run
#
# The PoC scope (§15.3) is small enough to run on the free tier.
# Future expansion (visual regression, GDScript test runner) will
# add jobs to this file.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  data-layer:
    name: Data layer (Python schema validation)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: game
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Create venv
        run: uv venv

      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Validate all data files
        run: |
          source .venv/bin/activate
          python tools/validate_data.py

      - name: Run pytest
        run: |
          source .venv/bin/activate
          python -m pytest tests/test_validate_data.py -v

  godot-runtime:
    name: Godot runtime (4.3 headless smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: game
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot 4.3
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          platform: linux.ci

      - name: Boot Godot headless
        run: godot --headless --path . --quit

      - name: Validate project.godot
        run: |
          test -f project.godot || (echo "project.godot missing" && exit 1)
          grep -q "config_version=5" project.godot || (echo "not a Godot 4.x project" && exit 1)
          echo "project.godot is well-formed"

      - name: Validate main.tscn
        run: |
          test -f scenes/main.tscn || (echo "main.tscn missing" && exit 1)
          grep -q "format=3" scenes/main.tscn || (echo "not Godot 4.x scene format" && exit 1)
          echo "main.tscn is well-formed"

  data-validation-summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [data-layer, godot-runtime]
    if: always()
    steps:
      - name: Result
        run: |
          if [ "${{ needs.data-layer.result }}" = "success" ] && [ "${{ needs.godot-runtime.result }}" = "success" ]; then
            echo "All checks passed"
            exit 0
          else
            echo "One or more checks failed"
            echo "  data-layer: ${{ needs.data-layer.result }}"
            echo "  godot-runtime: ${{ needs.godot-runtime.result }}"
            exit 1
          fi
